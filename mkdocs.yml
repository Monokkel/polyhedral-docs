site_name: Polyhedral Game Framework
site_description: Modular Unreal Engine plugins for turn-based, board-game-like games
site_url: https://monokkel.github.io/polyhedral-docs/
repo_url: https://github.com/Monokkel/polyhedral-docs
repo_name: Monokkel/polyhedral-docs
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - content.action.edit
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Installation: getting-started/installation.md
      - Your First Board: getting-started/first-board.md
  - Concepts:
      - concepts/index.md
      - Entities: concepts/entities-as-data.md
      - Tagged Data: concepts/tagged-data.md
      - Commands & Undo: concepts/commands-and-undo.md
      - Derived State & Events: concepts/derived-state.md
      - Evaluators: concepts/evaluators.md
      - Stats & Modifiers: concepts/stats-and-modifiers.md
      - Events & Reactions: concepts/events-and-reactions.md
      - Turns & Scheduling: concepts/turns-and-scheduling.md
      - Grids & Occupancy: concepts/grids-and-occupancy.md
      - Tokens & Cues: concepts/tokens-and-cues.md
  - Plugins:
      - plugins/index.md
      - TaggedData:
          - plugins/taggeddata/index.md
          - Guides: plugins/taggeddata/guides.md
          - API Reference: plugins/taggeddata/reference.md
      - CommandSystem:
          - plugins/commandsystem/index.md
          - Guides: plugins/commandsystem/guides.md
          - API Reference: plugins/commandsystem/reference.md
      - Evaluators:
          - plugins/evaluators/index.md
          - Guides: plugins/evaluators/guides.md
          - API Reference: plugins/evaluators/reference.md
      - GameEntity:
          - plugins/gameentity/index.md
          - Guides: plugins/gameentity/guides.md
          - API Reference:
              - Entities & Templates: plugins/gameentity/reference-entities.md
              - Stats & Modifiers: plugins/gameentity/reference-stats.md
              - Change Events: plugins/gameentity/reference-events.md
              - Commands & Replay: plugins/gameentity/reference-commands.md
      - TagEvents:
          - plugins/tagevents/index.md
          - API Reference: plugins/tagevents/reference.md
  - Community Guides: community/index.md
